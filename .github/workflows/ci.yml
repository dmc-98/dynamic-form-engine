name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_API: ${{ vars.TURBO_API }}
  TURBO_REMOTE_ONLY: ${{ vars.TURBO_REMOTE_ONLY }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM || secrets.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  verify:
    name: Root Verify (Node 20)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Smoke built artifacts
        run: pnpm test:smoke:artifacts

      - name: Smoke wrapper packages
        run: pnpm test:smoke:wrappers

      - name: Run tests
        run: pnpm test

      - name: Enforce stable package coverage
        run: pnpm test:coverage:stable

      - name: Release readiness
        run: pnpm release:check

      - name: Typecheck
        run: pnpm typecheck

  example-e2e:
    name: Canonical Example E2E
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: dfe
          POSTGRES_PASSWORD: dfe_secret
          POSTGRES_DB: dfe_example
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dfe"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      CI: true
      DATABASE_URL: postgresql://dfe:dfe_secret@127.0.0.1:5432/dfe_example

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Run canonical example E2E
        run: pnpm test:e2e:example

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-example-artifacts
          path: output/playwright
          if-no-files-found: ignore

  node-compat:
    name: Node Compatibility (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Core smoke check
        run: pnpm --filter @sn-arjun/dfe-core build
